name: Build iOS Release

on:
  pull_request_review:
    types: [submitted]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build iOS Release
    if: github.event.review.state == 'approved'
    runs-on: macos-14
    steps:
      - name: Get the latest commit SHA
        id: sha
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const { owner, repo, number } = context.issue
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            })
            return pr.data.head.sha

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.sha.outputs.result }}
          fetch-depth: 5

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.rustup
            target
          key: macos-latest-nightly

      - name: Check cpu arch
        run: |
          uname -p

      - name: Install Rust
        run: |
          rustup toolchain install nightly-2023-06-15
          rustup default nightly-2023-06-15-aarch64-apple-darwin
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
          rustup show
          cargo install cbindgen --version 0.26.0 --locked
          brew install protobuf

      - name: Read VERSION file
        id: getversion
        run: |
          echo "version=$(cat VERSION)+$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "tag_name=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "short_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get commits
        id: getcommits
        shell: bash
        run: |
          OUTPUT="$(git log -n 5 --pretty=format:"%s")"
          echo ::set-output name=commits::"${OUTPUT}"

      - name: Build And Publish
        id: build
        run: |
          # Build ikc (imKeyCore) for all iOS targets
          pushd ./imkey-core/ikc
          # Build for device (arm64)
          cargo build --release --target aarch64-apple-ios
          # Build for simulator (arm64)
          cargo build --release --target aarch64-apple-ios-sim
          # Build for simulator (x86_64)
          cargo build --release --target x86_64-apple-ios
          # Create simulator universal binary (arm64 + x86_64)
          mkdir -p ${{github.workspace}}/target/universal/release
          lipo -create -output ${{github.workspace}}/target/universal/release/libconnector-sim.a \
            ${{github.workspace}}/target/aarch64-apple-ios-sim/release/libconnector.a \
            ${{github.workspace}}/target/x86_64-apple-ios/release/libconnector.a
          cbindgen ./src/lib.rs -l c > ${{github.workspace}}/target/connector.h
          popd

          # Build tcx (TokenCore) for all iOS targets
          pushd ./token-core/tcx
          # Build for device (arm64)
          cargo build --release --target aarch64-apple-ios
          # Build for simulator (arm64)
          cargo build --release --target aarch64-apple-ios-sim
          # Build for simulator (x86_64)
          cargo build --release --target x86_64-apple-ios
          # Create simulator universal binary (arm64 + x86_64)
          mkdir -p ${{github.workspace}}/target/universal/release
          lipo -create -output ${{github.workspace}}/target/universal/release/libtcx-sim.a \
            ${{github.workspace}}/target/aarch64-apple-ios-sim/release/libtcx.a \
            ${{github.workspace}}/target/x86_64-apple-ios/release/libtcx.a
          cbindgen ./src/lib.rs -l c > ${{github.workspace}}/target/tcx.h
          popd

          # Prepare directories
          if [ -d "./ios-release" ]; then
            rm -rf ./ios-release
          fi
          mkdir -p ./ios-release/device ./ios-release/simulator

          BUILD_DIR=./Products
          BUILD_ROOT=./Products
          SYMROOT=./Products
          BUILD_PRODUCTS=./Products
          CONFIGURATION=Release
          PROJECT_NAME_IKC=imKeyCoreX
          PROJECT_NAME_TCX=TokenCoreX

          # Build imKeyCoreX Device Framework
          pushd ./imkey-core/mobile-sdk/imKeyCoreX        
          mkdir -p $BUILD_DIR
          
          # Copy device library (arm64 only)
          cp ${{github.workspace}}/target/aarch64-apple-ios/release/libconnector.a ./imKeyCoreX/libconnector.a
          cp ${{github.workspace}}/target/connector.h ./imKeyCoreX/connector.h
          
          # Build device framework
          xcodebuild -target $PROJECT_NAME_IKC ONLY_ACTIVE_ARCH=NO -configuration $CONFIGURATION -sdk iphoneos BUILD_DIR=$BUILD_DIR BUILD_ROOT=$BUILD_ROOT build
          
          # Save device framework (keep original name)
          cp -R $BUILD_DIR/$CONFIGURATION-iphoneos/$PROJECT_NAME_IKC.framework ${{github.workspace}}/ios-release/device/
          
          # Build imKeyCoreX Simulator Framework
          # Copy simulator library (arm64 + x86_64)
          cp ${{github.workspace}}/target/universal/release/libconnector-sim.a ./imKeyCoreX/libconnector.a
          
          # Build simulator framework
          xcodebuild -target $PROJECT_NAME_IKC -configuration Debug -sdk iphonesimulator ONLY_ACTIVE_ARCH=NO BUILD_DIR=$BUILD_DIR BUILD_ROOT=$BUILD_ROOT build      
          
          # Save simulator framework (keep original name)
          cp -R $BUILD_DIR/Debug-iphonesimulator/$PROJECT_NAME_IKC.framework ${{github.workspace}}/ios-release/simulator/
          
          popd

          # Create imKeyCoreX XCFramework
          pushd ${{github.workspace}}/ios-release
          xcodebuild -create-xcframework \
            -framework device/$PROJECT_NAME_IKC.framework \
            -framework simulator/$PROJECT_NAME_IKC.framework \
            -output $PROJECT_NAME_IKC.xcframework
          
          # Package
          PACKAGE_NAME=ios-ikc-${{ steps.getversion.outputs.version }}.zip
          zip -q -r $PACKAGE_NAME ${PROJECT_NAME_IKC}.xcframework
          echo "imkeycorex_sha256=$(shasum -a 256 $PACKAGE_NAME | awk '{ print $1 }')" >> $GITHUB_OUTPUT
          echo "imKeyCoreX sha256: $(shasum -a 256 $PACKAGE_NAME | awk '{ print $1 }')"
          cp $PACKAGE_NAME ../
          popd

          # Build TokenCoreX Device Framework
          pushd ./token-core/tcx-examples/TokenCoreX       
          mkdir -p $BUILD_DIR
          
          # Copy device library (arm64 only)
          cp ${{github.workspace}}/target/aarch64-apple-ios/release/libtcx.a ./TokenCoreX/libtcx.a
          cp ${{github.workspace}}/target/tcx.h ./TokenCoreX/tcx.h
          
          # Build device framework
          xcodebuild -target $PROJECT_NAME_TCX ONLY_ACTIVE_ARCH=NO -configuration $CONFIGURATION -sdk iphoneos BUILD_DIR=$BUILD_DIR BUILD_ROOT=$BUILD_ROOT build
          
          # Save device framework (keep original name)
          cp -R $BUILD_DIR/$CONFIGURATION-iphoneos/$PROJECT_NAME_TCX.framework ${{github.workspace}}/ios-release/device/
          
          # Build TokenCoreX Simulator Framework
          # Copy simulator library (arm64 + x86_64)
          cp ${{github.workspace}}/target/universal/release/libtcx-sim.a ./TokenCoreX/libtcx.a
          
          # Build simulator framework
          xcodebuild -target $PROJECT_NAME_TCX -configuration Debug -sdk iphonesimulator ONLY_ACTIVE_ARCH=NO BUILD_DIR=$BUILD_DIR BUILD_ROOT=$BUILD_ROOT build      
          
          # Save simulator framework (keep original name)
          cp -R $BUILD_DIR/Debug-iphonesimulator/$PROJECT_NAME_TCX.framework ${{github.workspace}}/ios-release/simulator/
          
          popd

          # Create TokenCoreX XCFramework
          pushd ${{github.workspace}}/ios-release
          xcodebuild -create-xcframework \
            -framework device/$PROJECT_NAME_TCX.framework \
            -framework simulator/$PROJECT_NAME_TCX.framework \
            -output $PROJECT_NAME_TCX.xcframework
          
          # Package
          PACKAGE_NAME=ios-tcx-${{ steps.getversion.outputs.version }}.zip
          zip -q -r $PACKAGE_NAME ${PROJECT_NAME_TCX}.xcframework
          echo "tokencorex_sha256=$(shasum -a 256 $PACKAGE_NAME | awk '{ print $1 }')" >> $GITHUB_OUTPUT
          echo "TokenCoreX sha256: $(shasum -a 256 $PACKAGE_NAME | awk '{ print $1 }')"
          cp $PACKAGE_NAME ../
          popd

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ steps.getversion.outputs.version }}"
          tag_name: "v${{ steps.getversion.outputs.version }}"
          generate_release_notes: true
          files: |
            ios-ikc-${{ steps.getversion.outputs.version }}.zip
            ios-tcx-${{ steps.getversion.outputs.version }}.zip

      - name: Send custom JSON data to Slack workflow
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          # For posting a rich message using Block Kit
          payload: |
            {
              "text": "New build of ios-token-core: ${{ job.status }}\nVERSION: ${{ steps.getversion.outputs.version }}\nimKey Core X Sha256: ${{ steps.build.outputs.imkeycorex_sha256 }}\nToken Core X Sha256: ${{ steps.build.outputs.tokencorex_sha256 }}\nCheck more: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}\nCommits:\n${{ steps.getcommits.outputs.commits }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "New build of ios-token-core: ${{ job.status }}\nVERSION: ${{ steps.getversion.outputs.version }}\nimKey Core X Sha256: ${{ steps.build.outputs.imkeycorex_sha256 }}\nToken Core X Sha256: ${{ steps.build.outputs.tokencorex_sha256 }}\nCheck more: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}\nCommits:\n${{ steps.getcommits.outputs.commits }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
