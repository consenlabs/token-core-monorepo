syntax = "proto3";
package tronapi;

message TronTxInput {
    string raw_data = 2;
}

message TronTxOutput {
    string signature = 1;
}

// Message signing input for TRON
//
// Message signing versions:
// - version = 1: V1 format with header "\x19TRON Signed Message:\n32"
// - version = 2: V2 format with header "\x19TRON Signed Message:\n"
// - version = 3: TIP-712 format with header "\x19\x01"
//
// TIP-712 (EIP-712) Structured Data Signing:
// When using version = 3 for TIP-712 structured data signing, the `message` field
// must be the pre-computed 32-byte digest (64 hex characters). The caller is
// responsible for computing:
//   digest = keccak256(domainSeparator || hashStruct(message))
// 
// The signature is computed as:
//   sign(keccak256("\x19\x01" || digest))
//
// Example TIP-712 input:
// {
//   "message": "0xf2cee375fa42b42143804025fc449deafd50cc031ca257e0b194a650a912090fc52c0ee5d84264471806290a3f2c4cecfc5490626bf912d01f240d7a274b371e",
//   "header": "TRON",
//   "version": 3
// }
//
// Reference: https://github.com/tronprotocol/tips/blob/master/tip-712.md
message TronMessageInput {
    // The message to sign
    // - For version 1/2: Raw message string or hex string (with 0x prefix)
    // - For version 3 (TIP-712): MUST be 32-byte hex string (64 hex chars with 0x prefix)
    string message = 1;
    
    // Header type: "TRON", "ETH", or "NONE"
    string header = 2;
    
    // Version: 1 (V1), 2 (V2), or 3 (TIP-712)
    uint32 version = 3;
}

message TronMessageOutput {
    string signature = 1;
}
