syntax = "proto3";
package ethapi;

message EthTxInput {
    string nonce = 1;
    string gas_price = 2;
    string gas_limit = 3;
    string to = 4;
    string value = 5;
    string data = 6;
    string chain_id = 7;
    string type = 8;
    string max_fee_per_gas = 9;
    string max_priority_fee_per_gas = 10;
    repeated AccessList access_list = 11;
}

message AccessList {
    string address = 1;
    repeated string storage_keys = 2;
}

message EthTxOutput {
    string signature = 1;
    string txHash = 2;
}

message EthMessageInput {
    string message = 1;
    bool isPersonalSign = 2;
}

message EthMessageOutput {
    string signature = 1;
}

// ----------------------------------------------------------------------
// Batch ETH transaction signing.
//
// `SignTxsInput` is the body wrapped in `SignParam.input` for the
// `sign_txs` action (chain-neutral name; the dispatcher uses
// `SignParam.chain_type == "ETHEREUM"` to route here): a single FFI call
// signs N ETH transactions,
// each item carrying its own per-tx display strings (payment / receiver /
// fee), expected sender for address verification, and an optional path
// override (empty string falls back to the outer `SignParam.path`).
//
// Per-item processing is a thin loop over the existing single-tx
// `Transaction::sign` flow — every device session action (select_applet
// / prepare_sign / get_xpub / sign_digest / user button confirm) still
// happens N times exactly as it would for N individual sign_tx calls.
// The batch wrapper only adds: 1 FFI call instead of N, ordered
// execution, all-or-nothing semantics, index-prefixed errors.
// ----------------------------------------------------------------------

message SignTxsInput {
    repeated SignTxsItem items = 1;
}

message SignTxsItem {
    EthTxInput tx = 1;
    string payment = 2;
    string receiver = 3;
    string sender = 4;
    string fee = 5;
    // Per-item HD path override. Empty string falls back to
    // `SignParam.path` (the outer batch-shared default).
    string path = 6;
}

message SignTxsOutput {
    repeated EthTxOutput outputs = 1;
}