[package]
name = "coin-cosmos"
version = "0.1.0"
authors = ["joe <xielamenla@qq.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
ikc-common = {path = "../../ikc-common"}
ikc-device = {path = "../../ikc-device"}
ikc-transport = {path = "../../ikc-transport"}
bitcoin_hashes = "=0.20.0"
hex = "=0.4.3"
bitcoin = "=0.32.9"
secp256k1 = {version = "=0.31.1", features = ["rand", "recovery"] }
bech32 = "=0.11.1"
serde = { version = "=1.0.228", features = ["derive"] }
serde_derive = "=1.0.228"
serde_json = { version = "=1.0.149", default-features = false, features = ["alloc"] }
num-bigint = "=0.4.6"
num-traits = "=0.2.19"
num-integer = "=0.1.46"
base64 = "=0.22.1"
anyhow = "=1.0.102"
bytes = "=1.11.1"
prost = "=0.14.3"
prost-types = "=0.14.3"
linked-hash-map = { version = "=0.5.6", features = ["serde_impl"] }