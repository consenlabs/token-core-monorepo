[package]
name = "coin-btc-fork"
version = "0.1.0"
authors = ["wyoyw <wyoyw@126.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
ikc-common = {path = "../../ikc-common"}
ikc-device = {path = "../../ikc-device"}
ikc-transport = {path = "../../ikc-transport"}

bitcoin = "=0.32.9"
secp256k1 = {version = "=0.31.1", features = ["rand", "recovery"] }
tiny-bip39 = "=2.0.0"
anyhow = "=1.0.102"
hex = "=0.4.3"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
bitcoin_hashes = "=0.20.0"
num-bigint = "=0.4.6"
bytes = "=1.11.1"
prost = "=0.14.3"
prost-types = "=0.14.3"
lazy_static = "=1.5.0"
parking_lot = "=0.12.5"
bech32 = "=0.11.1"
base64 = "=0.22.1"

