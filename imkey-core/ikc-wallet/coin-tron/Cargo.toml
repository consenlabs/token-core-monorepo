[package]
name = "coin-tron"
version = "0.1.0"
authors = ["xiemener <xielamenla@qq.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
keccak-hash = "=0.12.0"
anyhow = "=1.0.102"
bitcoin = "=0.32.9"
hex = "=0.4.3"
ikc-common = {path = "../../ikc-common"}
ikc-device = {path = "../../ikc-device"}
ikc-transport = {path = "../../ikc-transport"}
prost = "=0.14.3"
secp256k1 = {version = "=0.31.1", features = ["rand", "recovery"] }
tiny-keccak = { version = "=2.0.2", features = ["keccak"] }
byteorder = "=1.5.0"