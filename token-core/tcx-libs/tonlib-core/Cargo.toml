[package]
name = "tonlib-core"
description = "Rust SDK for The Open Network"
version = "0.21.1"
edition = "2021"
license = "MIT"
repository = "https://github.com/ston-fi/tonlib-rs"
resolver = "2"

[dependencies]
base64 = "=0.22.1"
bitstream-io = "=2.6.0"
crc = "=3.4.0"
hex = "=0.4.3"
hmac = "=0.13.0"
lazy_static = "=1.5.0"
num-bigint = { version = "=0.4.6", features = ["serde"] }
num-traits = "=0.2.19"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
sha2 = "=0.11.0"
thiserror = "=2.0.18"
